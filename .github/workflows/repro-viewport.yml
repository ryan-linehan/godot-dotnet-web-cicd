name: Repro - Viewport TypeInit crash (NoctemCat fork)

# Standalone repro: the upstream demo never touches Godot.Viewport from C#,
# so the binding mismatch (web template missing `set_use_xr` while glue
# includes `Viewport.UseXR`) doesn't surface there. This workflow checks
# out the demo, drops in a one-line autoload that calls
# GetTree().Root.GetVisibleRect(), exports it through this toolchain, and
# uploads the build. Open it in a COOP/COEP server and the browser console
# shows TypeInitializationException on Godot.Viewport with inner
# NativeMethodBindNotFoundException(Method 'Viewport.set_use_xr').

on:
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo (provides action.yml)
        uses: actions/checkout@v4

      - name: Check out demo project
        uses: actions/checkout@v4
        with:
          repository: NoctemCat/DotnetWebExportDemo
          ref: integrated_in_sdk
          submodules: false
          path: demo

      - name: Inject ViewportRepro autoload
        run: |
          cat > demo/csharp_project/ViewportRepro.cs <<'CS'
          using Godot;

          public partial class ViewportRepro : Node
          {
              public override void _Ready()
              {
                  GD.Print("REPRO 1: read GetVisibleRect");
                  try { var r = GetTree().Root.GetVisibleRect(); GD.Print("  ok: ", r); }
                  catch (System.Exception e) { LogException("GetVisibleRect", e); }

                  GD.Print("REPRO 2: read Viewport.UseXR (the missing bind)");
                  try { var x = GetTree().Root.UseXR; GD.Print("  ok: ", x); }
                  catch (System.Exception e) { LogException("UseXR getter", e); }

                  GD.Print("REPRO 3: write Viewport.UseXR = false (set_use_xr direct)");
                  try { GetTree().Root.UseXR = false; GD.Print("  ok"); }
                  catch (System.Exception e) { LogException("UseXR setter", e); }

                  GD.Print("REPRO 4: explicit RuntimeHelpers.RunClassConstructor on Viewport");
                  try
                  {
                      System.Runtime.CompilerServices.RuntimeHelpers.RunClassConstructor(
                          typeof(Godot.Viewport).TypeHandle);
                      GD.Print("  ok");
                  }
                  catch (System.Exception e) { LogException("RunClassConstructor", e); }

                  GD.Print("REPRO done");
              }

              private static void LogException(string label, System.Exception e)
              {
                  GD.PushError($"REPRO[{label}] outer: {e.GetType().FullName}: {e.Message}");
                  GD.Print($"REPRO[{label}] outer: {e.GetType().FullName}: {e.Message}");
                  for (var inner = e.InnerException; inner != null; inner = inner.InnerException)
                  {
                      GD.PushError($"REPRO[{label}] inner: {inner.GetType().FullName}: {inner.Message}");
                      GD.Print($"REPRO[{label}] inner: {inner.GetType().FullName}: {inner.Message}");
                  }
              }
          }
          CS

          # Demo's project.godot has no [autoload] section, so plain append works.
          cat >> demo/csharp_project/project.godot <<'GODOT'

          [autoload]

          ViewportRepro="*res://ViewportRepro.cs"
          GODOT

          echo "----- ViewportRepro.cs -----"
          cat demo/csharp_project/ViewportRepro.cs
          echo "----- project.godot tail -----"
          tail -20 demo/csharp_project/project.godot

      - name: Export web build
        uses: ./
        with:
          project-path: demo/csharp_project
          preset: WebNothreads
          output: build/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewport-repro
          path: demo/csharp_project/build
          if-no-files-found: error
