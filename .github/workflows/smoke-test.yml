name: Smoke test (export demo project)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Build toolchain image']
    types: [completed]

jobs:
  export-demo:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out demo project
        uses: actions/checkout@v4
        with:
          repository: NoctemCat/DotnetWebExportDemo
          ref: integrated_in_sdk
          submodules: false
          path: demo

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export web build
        uses: ./
        with:
          project-path: demo
          preset: Web
          output: build/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: demo/build
          if-no-files-found: error
