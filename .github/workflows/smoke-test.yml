name: Smoke test (export demo project)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Build toolchain image']
    types: [completed]

jobs:
  export-demo:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out this repo (provides action.yml)
        uses: actions/checkout@v4

      - name: Check out demo project
        uses: actions/checkout@v4
        with:
          repository: NoctemCat/DotnetWebExportDemo
          ref: master
          submodules: false
          path: demo

      - name: Override main scene to Scene2d (tests Node-array exports)
        run: |
          sed -i 's|^run/main_scene=.*|run/main_scene="res://Scene2d.tscn"|' demo/csharp_project/project.godot
          echo "==> main_scene after override:"
          grep '^run/main_scene' demo/csharp_project/project.godot

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export web build
        uses: ./
        with:
          project-path: demo/csharp_project
          preset: Web
          output: build/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: demo/csharp_project/build
          if-no-files-found: error
